name: Bootstrap Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-bootstrap:
    name: Validate repo continuity files
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run bootstrap validation script
        shell: pwsh
        run: .\scripts\validate-bootstrap.ps1
